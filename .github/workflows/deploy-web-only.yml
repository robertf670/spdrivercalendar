# Deploy Web PWA only - run manually to test Vercel without releasing APK
name: Deploy Web Only

on:
  workflow_dispatch:

jobs:
  build-web:
    name: Build and Deploy Web (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.5'
          channel: 'stable'

      - name: Get dependencies
        run: flutter pub get

      - name: Build Flutter Web
        env:
          WORK_ACCESS_HASH: ${{ secrets.WORK_ACCESS_HASH }}
        run: |
          if [ -n "$WORK_ACCESS_HASH" ]; then
            flutter build web --release --dart-define=WORK_ACCESS_HASH=$WORK_ACCESS_HASH
          else
            flutter build web --release
          fi

      - name: Deploy to Vercel
        uses: amondnet/vercel-action@v25
        with:
          vercel-version: latest
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
          working-directory: build/web
          vercel-args: '--prod'
